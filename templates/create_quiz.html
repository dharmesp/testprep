{% extends "base.html" %}

{% block title %}Create Quiz - Test Prep{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <h2 style="margin-bottom: 20px;">➕ Create New Quiz</h2>
    
    <form method="POST" action="{{ url_for('create_quiz') }}">
        <div class="form-group">
            <label for="title">Quiz Title *</label>
            <input type="text" id="title" name="title" required autofocus placeholder="E.g., Math Practice Test">
        </div>
        
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" placeholder="Brief description of the quiz..."></textarea>
        </div>
        
        <div style="display: flex; gap: 8px;">
            <button type="submit" class="btn btn-primary">Create Quiz</button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
