{% extends "base.html" %}

{% block title %}Register - Test Prep{% endblock %}

{% block content %}
<div style="max-width: 420px; margin: 40px auto;">
    <h2 style="text-align: center; margin-bottom: 30px;">✨ Create Account</h2>
    
    <form method="POST" action="{{ url_for('register') }}">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autofocus>
        </div>
        
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required minlength="6">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px;">
            Create Account
        </button>
    </form>
    
    <p style="text-align: center; margin-top: 20px; color: #808080; font-size: 14px;">
        Already have an account?
        <a href="{{ url_for('login') }}" style="color: #000000; text-decoration: none; font-weight: 600;">
            Login here
        </a>
    </p>
</div>
{% endblock %}
